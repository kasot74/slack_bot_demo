name: Deploy to AWS ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Log in to Amazon ECR
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      run: |
        aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REPOSITORY"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.ECR_REPOSITORY }}/slock_bot/app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Deploy via SSM Run Command (no SSH key required)
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}",
            "cd /home/ubuntu/slock_bot",
            "docker compose pull",
            "docker compose down",
            "docker compose up -d",
            "docker image prune -f"
          ]' \
          --comment "slack_bot_demo deploy from GitHub Actions run ${{ github.run_id }}" \
          --query 'Command.CommandId' --output text)

        echo "SSM CommandId: $COMMAND_ID"

        aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

        STATUS=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
          --query Status --output text)

        if [ "$STATUS" != "Success" ]; then
          echo "Deploy command finished with status: $STATUS"
          exit 1
        fi

    - name: Notify Slack
      if: contains(github.event.head_commit.message, '[更新說明]')
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        GIT_COMMIT_MSG: ${{ github.event.head_commit.message }}
      run: |
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"更新完成！\n  $GIT_COMMIT_MSG\n\"}" "$SLACK_WEBHOOK_URL"
